<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đặt lại mật khẩu — Bếp Của Mẹ</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#12101F; padding:20px; box-sizing:border-box; }
    .reset-card {
      background:#1F1040; border-radius:24px; padding:40px 36px;
      width:100%; max-width:420px;
      box-shadow:0 20px 60px rgba(0,0,0,0.4);
    }
    .reset-brand { text-align:center; margin-bottom:28px; }
    .reset-brand h2 { color:#FFD60A; font-size:1.3rem; margin:8px 0 4px; }
    .reset-brand p  { color:rgba(255,255,255,0.45); font-size:0.88rem; }
    .auth-field { margin-bottom:16px; }
    .auth-field label { display:block; font-size:0.82rem; color:rgba(255,255,255,0.6); margin-bottom:6px; }
    .auth-field input {
      width:100%; padding:12px 14px; border-radius:10px; border:1.5px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.05); color:#fff; font-size:16px; box-sizing:border-box;
    }
    .auth-field input:focus { outline:none; border-color:#FF6B2B; }
    .btn-primary {
      width:100%; padding:14px; border:none; border-radius:14px; cursor:pointer; font-size:1rem; font-weight:800;
      background:linear-gradient(135deg,#FF6B2B,#FF8C00); color:#fff; margin-top:8px;
    }
    .btn-primary:disabled { opacity:0.6; cursor:not-allowed; }
    .msg { text-align:center; padding:12px; border-radius:10px; margin-bottom:16px; font-size:0.9rem; }
    .msg.error   { background:rgba(255,80,80,0.12); color:#ff6b6b; border:1px solid rgba(255,80,80,0.3); }
    .msg.success { background:rgba(0,212,160,0.12); color:#00D4A0; border:1px solid rgba(0,212,160,0.3); }
    a.back { display:block; text-align:center; margin-top:16px; color:rgba(255,255,255,0.4); font-size:0.85rem; text-decoration:none; }
    a.back:hover { color:#FF6B2B; }
  </style>
</head>
<body>
<div class="reset-card">
  <div class="reset-brand">
    <div style="font-size:2rem">🍱</div>
    <h2>Bếp Của Mẹ</h2>
    <p>Đặt lại mật khẩu của bạn</p>
  </div>

  <div id="msgBox" style="display:none" class="msg"></div>

  <form id="resetForm">
    <div class="auth-field">
      <label><i class="fa fa-lock"></i> Mật khẩu mới</label>
      <input type="password" id="newPass" placeholder="Ít nhất 6 ký tự" required minlength="6"/>
    </div>
    <div class="auth-field">
      <label><i class="fa fa-lock"></i> Xác nhận mật khẩu</label>
      <input type="password" id="newPass2" placeholder="Nhập lại mật khẩu" required/>
    </div>
    <button type="submit" class="btn-primary" id="resetBtn">
      Đặt lại mật khẩu <i class="fa fa-check"></i>
    </button>
  </form>

  <a href="/" class="back"><i class="fa fa-arrow-left"></i> Về trang chủ</a>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script>
  // Lấy config từ script.js — đọc inline để tránh phụ thuộc module
  const SUPABASE_URL      = 'https://iupxywqjwichfkhfurmu.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_ZCEiZAW29XvclKz7xCoTSQ_5ctA7wVN';

  const _sb = (SUPABASE_URL && SUPABASE_ANON_KEY)
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;

  const params = new URLSearchParams(location.search);
  const phone  = params.get('phone');
  const token  = params.get('token');

  function showMsg(text, type = 'error') {
    const el = document.getElementById('msgBox');
    el.textContent = text;
    el.className = 'msg ' + type;
    el.style.display = '';
  }

  function simpleHash(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
    return (h >>> 0).toString(36);
  }

  // Kiểm tra token ngay khi load
  async function verifyToken() {
    if (!phone || !token) {
      showMsg('Link không hợp lệ hoặc đã hết hạn.');
      document.getElementById('resetForm').style.display = 'none';
      return false;
    }

    if (_sb) {
      const { data } = await _sb.from('password_resets')
        .select('*').eq('phone', phone).eq('token', token).maybeSingle();
      if (!data) { showMsg('Link không hợp lệ hoặc đã được sử dụng.'); document.getElementById('resetForm').style.display = 'none'; return false; }
      if (new Date(data.expires_at) < new Date()) { showMsg('Link đã hết hạn. Vui lòng yêu cầu lại.'); document.getElementById('resetForm').style.display = 'none'; return false; }
    } else {
      const stored = JSON.parse(localStorage.getItem('bcm_reset_' + phone) || 'null');
      if (!stored || stored.token !== token || Date.now() > stored.expiry) {
        showMsg('Link không hợp lệ hoặc đã hết hạn.');
        document.getElementById('resetForm').style.display = 'none';
        return false;
      }
    }
    return true;
  }

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pass  = document.getElementById('newPass').value;
    const pass2 = document.getElementById('newPass2').value;
    const btn   = document.getElementById('resetBtn');

    if (pass.length < 6) { showMsg('Mật khẩu phải ít nhất 6 ký tự!'); return; }
    if (pass !== pass2)  { showMsg('Mật khẩu xác nhận không khớp!'); return; }

    const valid = await verifyToken();
    if (!valid) return;

    btn.disabled = true;
    btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Đang cập nhật…';

    const hash = simpleHash(pass);

    if (_sb) {
      // Cập nhật mật khẩu trên Supabase
      await _sb.from('users').update({ password_hash: hash }).eq('phone', phone);
      // Xóa token đã dùng
      await _sb.from('password_resets').delete().eq('phone', phone);
    } else {
      // Cập nhật localStorage
      const users = JSON.parse(localStorage.getItem('bcm_users') || '{}');
      const id = 'u_' + phone.replace(/\D/g, '');
      if (users[id]) { users[id].password = hash; localStorage.setItem('bcm_users', JSON.stringify(users)); }
      localStorage.removeItem('bcm_reset_' + phone);
    }

    document.getElementById('resetForm').style.display = 'none';
    showMsg('✅ Mật khẩu đã được đặt lại thành công! Bạn có thể đăng nhập ngay.', 'success');
  });

  verifyToken();
</script>
</body>
</html>
