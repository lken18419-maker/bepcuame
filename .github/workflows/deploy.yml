name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}      # team_dEoQJq0g0QWmhudblcNJIzzp
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }} # prj_kSNg57w98BOdYIwy6Nos9sqw098v
          vercel-args: '--prod'
          alias-domains: bepcuame.vercel.app
