<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3A20"/>
      <stop offset="100%" style="stop-color:#2F6B3F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F7C85C"/>
      <stop offset="100%" style="stop-color:#E0A830"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="980" cy="80"  r="180" fill="#7FB77E" opacity="0.10"/>
  <circle cx="1100" cy="500" r="220" fill="#F7C85C" opacity="0.08"/>
  <circle cx="60"  cy="560" r="160" fill="#7FB77E" opacity="0.08"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- Logo circle -->
  <circle cx="180" cy="250" r="100" fill="#F7C85C"/>
  <text x="180" y="275" font-size="96" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" fill="#1F1040">B</text>

  <!-- Brand name -->
  <text x="310" y="220" font-size="72" font-family="Arial,sans-serif" font-weight="900" fill="#FFD60A">Bếp Của Mẹ</text>

  <!-- Tagline -->
  <text x="310" y="278" font-size="32" font-family="Arial,sans-serif" fill="rgba(255,255,255,0.7)">Đồ ăn vặt ngon · Chuẩn vị nhà làm</text>

  <!-- Divider -->
  <rect x="100" y="340" width="1000" height="2" fill="rgba(255,255,255,0.1)" rx="1"/>

  <!-- Features row -->
  <text x="150" y="410" font-size="28" font-family="Arial,sans-serif" fill="#FF6B2B">✦</text>
  <text x="190" y="410" font-size="28" font-family="Arial,sans-serif" fill="rgba(255,255,255,0.85)">100+ món ăn vặt</text>

  <text x="470" y="410" font-size="28" font-family="Arial,sans-serif" fill="#FF6B2B">✦</text>
  <text x="510" y="410" font-size="28" font-family="Arial,sans-serif" fill="rgba(255,255,255,0.85)">Giao hàng toàn quốc</text>

  <text x="790" y="410" font-size="28" font-family="Arial,sans-serif" fill="#FF6B2B">✦</text>
  <text x="830" y="410" font-size="28" font-family="Arial,sans-serif" fill="rgba(255,255,255,0.85)">Miễn phí ship 700k+</text>

  <!-- CTA box -->
  <rect x="100" y="460" width="460" height="80" rx="16" fill="url(#accent)"/>
  <text x="330" y="510" font-size="30" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" fill="#fff">Đặt hàng ngay hôm nay</text>

  <!-- URL -->
  <text x="620" y="510" font-size="26" font-family="Arial,sans-serif" fill="rgba(255,255,255,0.45)">bepcuame.vercel.app</text>

  <!-- Emoji decorations -->
  <text x="980" y="300" font-size="120" text-anchor="middle" font-family="serif">🍱</text>
  <text x="900" y="430" font-size="64" text-anchor="middle" font-family="serif">🍟</text>
  <text x="1060" y="430" font-size="64" text-anchor="middle" font-family="serif">🧃</text>
</svg>
